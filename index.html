<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SEO Article Wizard v3.6 (Standard Long-Form)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .step-content { display: none; }
        .step-content.active { display: block; }
        .preview-window { height: 600px; border: 2px solid #e5e7eb; border-radius: 12px; background: #fff; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="bg-gradient-to-r from-indigo-700 to-violet-800 text-white p-6 shadow-lg">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold">🚀 AI SEO Wizard v3.6 - Artikel SEO</h1>
                <p class="text-indigo-200 text-sm">Standard Long-Form Engine • Target Pas 1.200+ Kata • Sekali Klik Beres</p>
            </div>
            <div class="w-full md:w-auto">
                <label class="block text-xs font-semibold text-indigo-200 mb-1">Gemini API Key:</label>
                <input type="password" id="api-key-input" placeholder="Masukkan AI Studio API Key Anda" class="w-full md:w-64 p-2 text-sm rounded bg-indigo-900 border border-indigo-500 text-white placeholder-indigo-400 focus:outline-none focus:ring-2 focus:ring-white">
<label class="block text-xs font-semibold text-indigo-200 mb-1">Api Key gratis di: <br />https://aistudio.google.com > Create Api Key</label>
            </div>
        </div>
    </header>

    <main class="container mx-auto my-8 p-8 bg-white rounded-2xl shadow-xl max-w-6xl">
        
        <!-- Navigasi Langkah -->
        <nav class="flex space-x-4 mb-8 border-b pb-4 overflow-x-auto">
            <button onclick="gantiStep(1)" class="step-btn font-bold text-indigo-600 border-b-2 border-indigo-600">1. Riset Lokal</button>
            <button onclick="gantiStep(2)" class="step-btn text-slate-400" id="nav-step-2" disabled>2. Konfigurasi Konten</button>
            <button onclick="gantiStep(3)" class="step-btn text-slate-400" id="nav-step-3" disabled>3. Editor & Skor</button>
            <button onclick="gantiStep(4)" class="step-btn text-slate-400" id="nav-step-4" disabled>4. Pratinjau & Export</button>
        </nav>

        <!-- ================= LANGKAH 1: RISET LOKAL ================= -->
        <div id="step-1" class="step-content active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-semibold mb-1">Topik Utama (Bahasa Indonesia)</label>
                    <input type="text" id="kw-input" placeholder="Misal: Jasa Renovasi Rumah" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Wilayah / Kota</label>
                    <input type="text" id="city-input" placeholder="Misal: Jakarta Selatan" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>

            <button onclick="searchKeywords()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Cari Kata Kunci</button>

            <div class="mt-8 overflow-x-auto">
                <table class="w-full text-sm border border-slate-200 rounded-lg">
                    <thead class="bg-slate-100 text-slate-700">
                        <tr>
                            <th class="p-3 border text-left">Keyword</th>
                            <th class="p-3 border text-left cursor-pointer hover:bg-slate-200 transition" onclick="sortData('vol')">Vol/Bulan ↕</th>
                            <th class="p-3 border text-left">Persaingan</th>
                            <th class="p-3 border text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="kw-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- ================= LANGKAH 2: KONFIGURASI KONTEN ================= -->
        <div id="step-2" class="step-content">
            <h2 class="text-xl font-bold mb-4 text-slate-800">Personalisasi AI Konten (1.200+ Kata)</h2>
            
            <div class="space-y-4 bg-slate-50 p-6 rounded-xl border mb-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Target Kata Kunci Terpilih</label>
                    <input type="text" id="selected-kw-display" readonly class="w-full p-3 border rounded bg-slate-200 font-semibold text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Pilih Gaya Bahasa AI</label>
                    <select id="ai-tone" class="w-full p-3 border rounded bg-white font-medium focus:ring-2 focus:ring-indigo-500">
                        <option value="Profesional, edukatif, informatif, mendalam, lengkap dengan analisis data tekstual">Profesional & Edukatif</option>
                        <option value="Santai, mengalir, persuasif, solutif, akrab, mudah dipahami">Santai & Bersahabat</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Tambahkan Nama Kawasan Populer (Opsional)</label>
                    <input type="text" id="local-details" placeholder="Contoh: Sudirman, Kemang, Tebet, Cilandak" class="w-full p-3 border rounded bg-white">
                </div>
            </div>

            <div class="flex justify-between">
                <button onclick="gantiStep(1)" class="px-6 py-2 border rounded hover:bg-slate-100">Kembali</button>
                <button onclick="generateArtikel()" id="btn-generate" class="px-6 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700 shadow flex items-center gap-2">
                    <span>Generate Artikel (1x Klik)</span>
                </button>
            </div>
        </div>

        <!-- ================= LANGKAH 3: EDITOR & SKOR ================= -->
        <div id="step-3" class="step-content">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-3">
                    <textarea id="article-editor" rows="22" class="w-full p-4 border rounded-lg font-mono text-sm leading-relaxed focus:ring-2 focus:ring-indigo-500" oninput="updateScore()"></textarea>
                </div>
                <div class="bg-indigo-50 p-6 rounded-xl border border-indigo-100 h-fit">
                    <h3 class="font-bold text-center mb-4 text-indigo-900">SEO Audit</h3>
                    <div class="text-4xl font-black text-center text-indigo-600 mb-6"><span id="seo-score">0</span><small class="text-sm text-slate-500">/100</small></div>
                    <ul id="checklist" class="text-xs space-y-2"></ul>
                </div>
            </div>
            <div class="mt-6">
                <button onclick="finalize()" class="bg-green-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-green-700 transition shadow-md">Parsing ke Hasil Akhir + Inject Gambar</button>
            </div>
        </div>

        <!-- ================= LANGKAH 4: PRATINJAU & EXPORT ================= -->
        <div id="step-4" class="step-content">
            <div class="mb-6 flex space-x-4">
                <button onclick="showMode('visual')" class="px-4 py-2 bg-indigo-600 text-white rounded font-bold shadow-sm" id="btn-visual">Tampilan Web (Visual)</button>
                <button onclick="showMode('code')" class="px-4 py-2 bg-slate-200 text-slate-700 rounded font-bold" id="btn-code">Source Code (HTML + FAQ Schema)</button>
            </div>

            <div id="visual-preview" class="preview-window overflow-hidden">
                <iframe id="preview-frame" class="w-full h-full border-none"></iframe>
            </div>

            <div id="code-preview" class="hidden">
                <pre id="html-output" class="p-4 bg-slate-900 text-emerald-400 rounded-lg text-xs overflow-x-auto whitespace-pre-wrap max-h-96 font-mono"></pre>
            </div>

            <div class="mt-8 flex space-x-4">
                <button onclick="copyContent()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg flex-1 font-bold transition shadow">Copy Hasil Akhir HTML</button>
                <button onclick="gantiStep(2)" class="border border-slate-300 hover:bg-slate-100 px-6 py-3 rounded-lg flex-1 text-center font-medium transition">Generate Artikel Lain</button>
            </div>
        </div>

    </main>

    <script>
        let currentKw = "";
        let currentCity = "";
        let listDataKeyword = []; 
        let currentSortOrder = { vol: 'asc' };
        
        let aiGeneratedTitle = "";
        let aiGeneratedMeta = "";

        function gantiStep(n) {
            document.getElementById(`nav-step-${n}`)?.removeAttribute('disabled');
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${n}`).classList.add('active');
            document.querySelectorAll('.step-btn').forEach((b, i) => {
                b.className = (i+1 === n) ? "step-btn font-bold text-indigo-600 border-b-2 border-indigo-600" : "step-btn text-slate-400";
            });
        }

        function searchKeywords() {
            const topic = document.getElementById('kw-input').value.trim();
            const city = document.getElementById('city-input').value.trim();
            if(!topic || !city) return alert("Isi Topik dan Kota terlebih dahulu!");
            
            currentKw = topic;
            currentCity = city;
            listDataKeyword = [];
            
            const polaKataKunci = [
                `Jasa ${topic} ${city}`, `${topic} murah ${city}`, `${topic} terdekat di ${city}`,
                `Harga ${topic} ${city}`, `Rekomendasi ${topic} ${city} terbaik`
            ];

            polaKataKunci.forEach((keyword, index) => {
                listDataKeyword.push({
                    keyword: keyword,
                    vol: Math.floor(Math.random() * (2000 - 200)) + 200,
                    level: index % 2 === 0 ? "Sedang" : "Rendah"
                });
            });

            renderTable(listDataKeyword);
        }

        function renderTable(data) {
            const tbody = document.getElementById('kw-table-body');
            tbody.innerHTML = "";
            data.forEach((item) => {
                let badge = item.level === "Sedang" ? "bg-amber-100 text-amber-700" : "bg-green-100 text-green-700";
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition">
                        <td class="p-3 font-medium text-slate-800">${item.keyword}</td>
                        <td class="p-3 text-slate-600 font-mono">${item.vol.toLocaleString('id-ID')}</td>
                        <td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${badge}">${item.level}</span></td>
                        <td class="p-3 text-center">
                            <button onclick="pilihKw('${item.keyword}')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1 rounded text-xs shadow-sm">Gunakan</button>
                        </td>
                    </tr>
                `;
            });
        }

        function sortData(kolom) {
            const urutan = currentSortOrder[kolom] === 'asc' ? 'desc' : 'asc';
            currentSortOrder[kolom] = urutan;
            listDataKeyword.sort((a, b) => urutan === 'asc' ? a.vol - b.vol : b.vol - a.vol);
            renderTable(listDataKeyword);
        }
         
        function pilihKw(kw) {
            document.getElementById('selected-kw-display').value = kw;
            gantiStep(2);
        }

        async function generateArtikel() {
            const apiKey = document.getElementById('api-key-input').value.trim();
            if(!apiKey) return alert("Masukkan Gemini API Key Anda!");

            const selectedKw = document.getElementById('selected-kw-display').value;
            const toneInput = document.getElementById('ai-tone').value;
            const localDetails = document.getElementById('local-details').value.trim();
            const btn = document.getElementById('btn-generate');

            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span> Menulis Artikel...`;

            const prompt = `Anda adalah seorang Pakar SEO Content Writer. Buatlah artikel pilar yang komprehensif, padat informasi, dan teroptimasi SEO lokal mengenai "${selectedKw}" di kota "${currentCity}".

Aturan Konten:
1. Total panjang keseluruhan artikel harus berada di antara 1.200 sampai 1.500 kata (Jangan kurang dari 1200 kata, dan jangan lebih dari 1500 kata).
2. Gaya bahasa wajib: ${toneInput}. Sisipkan nama kawasan populer berikut jika relevan: ${localDetails ? localDetails : currentCity}.
3. Gunakan minimal 5 buah subjudul "## ".
4. Di bagian akhir sebelum artikel selesai, wajib tambahkan judul "## FAQ" yang berisi tepat 5 buah pertanyaan dan jawaban dengan format:
**Q: Pertanyaan**
**A: Jawaban**

Berikan output eksklusif dalam bentuk objek JSON murni tanpa tanda \`\`\`json:
{
  "judul": "Judul Utama Artikel SEO",
  "meta_deskripsi": "Meta deskripsi unik ringkas untuk Google",
  "konten_markdown": "# Judul Utama\\n\\n[Isi artikel lengkap beserta subjudul dan FAQ di sini...]"
}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let txtResponse = data.candidates[0].content.parts[0].text;
                txtResponse = txtResponse.replace(/^```json/i, '').replace(/```$/, '').trim();
                
                const parsedJson = JSON.parse(txtResponse);
                aiGeneratedTitle = parsedJson.judul;
                aiGeneratedMeta = parsedJson.meta_deskripsi;
                
                document.getElementById('article-editor').value = parsedJson.konten_markdown;
                
                updateScore();
                gantiStep(3);
            } catch (error) {
                console.error(error);
                alert("Gagal memproses pembuatan artikel. Hal ini lumrah terjadi jika server sibuk. Silakan klik ulang tombol sekali lagi!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Artikel (1x Klik)";
            }
        }
         
        function updateScore() {
            const val = document.getElementById('article-editor').value;
            const words = val.split(/\s+/).filter(Boolean).length;
            let score = 0;
            
            if(words >= 1200) score += 40; 
            if(val.includes('##')) score += 30;
            if(val.toLowerCase().includes(currentCity.toLowerCase())) score += 30;

            const matches = val.match(/Q:/g);
            const faqCount = matches ? matches.length : 0;

            document.getElementById('seo-score').innerText = score;
            document.getElementById('checklist').innerHTML = `
                <li class="${words >= 1200 ? 'text-green-600 font-medium' : 'text-amber-500'}">● Panjang: ${words} Kata (Target: 1200 - 1500)</li>
                <li class="${val.includes('##') ? 'text-green-600 font-medium' : 'text-red-500'}">● Struktur Heading Ok</li>
                <li class="${faqCount >= 4 ? 'text-green-600 font-medium' : 'text-amber-500'}">● Jumlah FAQ Terdeteksi: ${faqCount} (Target: 5)</li>
            `;
        }

        function finalize() {
            const raw = document.getElementById('article-editor').value;
            
            let html = raw.replace(/^# (.*$)/gim, '<h1 class="text-3xl md:text-4xl font-black text-indigo-900 mb-6 border-b-4 border-indigo-500 pb-2">$1</h1>')
                          .replace(/^## (.*$)/gim, '<h2 class="text-xl md:text-2xl font-bold text-slate-800 mt-10 mb-4 border-l-4 border-indigo-500 pl-3">$1</h2>')
                          .replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold text-slate-700 mt-6 mb-2">$1</h3>')
                          .replace(/\*\*(.*?)\*\*/g, '<strong class="text-indigo-700 font-semibold">$1</strong>');

            let paragraphs = html.split('\n\n');
            let headingCount = 0;

            let formattedHtml = paragraphs.map((p, idx) => {
                if(p.trim().startsWith('<h1')) return p;
                
                if(p.trim().startsWith('<h2')) {
                    headingCount++;
                    let appendImg = "";
                    if(headingCount === 1) {
                        appendImg = `<div class="my-6"><img src="https://picsum.photos/800/450?random=1" alt="${currentKw}" class="w-full rounded-xl shadow-md border"><p class="text-xs text-center text-slate-400 mt-2">Ilustrasi Gambar Pendukung - ${currentKw}</p></div>`;
                    } else if(headingCount === 3) {
                        appendImg = `<div class="my-6"><img src="https://picsum.photos/800/450?random=2" alt="${currentCity}" class="w-full rounded-xl shadow-md border"><p class="text-xs text-center text-slate-400 mt-2">Area Layanan Utama - ${currentCity}</p></div>`;
                    }
                    return p + appendImg;
                }
                return `<p class="mb-4 text-slate-600 leading-relaxed text-sm md:text-base text-justify">${p}</p>`;
            }).join('');

            let aiGeneratedFAQArray = [];
            const regexFAQ = /Q:\s*(.*?)\s*\n\s*A:\s*(.*?)(?=\n\s*Q:|\n\n|$)/gsi;
            let match;
            while ((match = regexFAQ.exec(raw)) !== null) {
                if (match[1] && match[2]) {
                    aiGeneratedFAQArray.push({
                        question: match[1].replace(/\*\*/g, '').trim(),
                        answer: match[2].replace(/\*\*/g, '').trim()
                    });
                }
            }

            if(aiGeneratedFAQArray.length === 0) {
                aiGeneratedFAQArray = [{ question: `Apakah melayani area ${currentCity}?`, answer: "Ya, kami melayani seluruh area tersebut." }];
            }

            const schemaQuestions = aiGeneratedFAQArray.map(item => ({
                "@type": "Question",
                "name": item.question,
                "acceptedAnswer": { "@type": "Answer", "text": item.answer }
            }));

            const faqSchemaJSON = {
                "@context": "https://schema.org",
                "@type": "FAQPage",
                "mainEntity": schemaQuestions
            };

            const fullPageHtml = `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${aiGeneratedTitle || 'Artikel SEO'}</title>
    <meta name="description" content="${aiGeneratedMeta || 'Panduan terlengkap.'}">
    <script type="application/ld+json">
    ${JSON.stringify(faqSchemaJSON, null, 4)}
    <\/script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"><\/script>
</head>
<body class="bg-white p-4 md:p-8 font-sans">
    <article class="max-w-4xl mx-auto shadow-sm border border-slate-100 p-6 md:p-10 rounded-xl">
        ${formattedHtml}
    </article>
</body>
</html>`;

            document.getElementById('html-output').innerText = fullPageHtml;
            document.getElementById('preview-frame').srcdoc = fullPageHtml;
            gantiStep(4);
            showMode('visual');
        }

        function showMode(mode) {
            const btnVisual = document.getElementById('btn-visual');
            const btnCode = document.getElementById('btn-code');
            
            if(mode === 'visual') {
                document.getElementById('visual-preview').classList.remove('hidden');
                document.getElementById('code-preview').classList.add('hidden');
                btnVisual.className = "px-4 py-2 bg-indigo-600 text-white rounded font-bold shadow-sm";
                btnCode.className = "px-4 py-2 bg-slate-200 text-slate-700 rounded font-bold";
            } else {
                document.getElementById('visual-preview').classList.add('hidden');
                document.getElementById('code-preview').classList.remove('hidden');
                btnVisual.className = "px-4 py-2 bg-slate-200 text-slate-700 rounded font-bold";
                btnCode.className = "px-4 py-2 bg-indigo-600 text-white rounded font-bold shadow-sm";
            }
        }

        function copyContent() {
            navigator.clipboard.writeText(document.getElementById('html-output').innerText);
            alert("Beres! Kode HTML dengan 5 FAQ Schema & Gambar siap dipasang di Google Sites!");
        }
    </script>
</body>
</html>
